version: '3.8'

services:
  jupyter:
    image: tensorflow/tensorflow:2.16.2-gpu-jupyter
    container_name: dockspawn-{DOCKSPAWN_RUN_NAME}
    ports:
      - "{DOCKSPAWN_BIND_IP}:{DOCKSPAWN_HOST_PORT}:{DOCKSPAWN_CONTAINER_PORT}"
    volumes:
      - "{DOCKSPAWN_WORKSPACE}:/home/host:rw"
    working_dir: /home/host
    environment:
      - NVIDIA_VISIBLE_DEVICES=${{DOCKSPAWN_GPU_DEVICES:-all}}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    restart: unless-stopped
{GPU_SECTION}
